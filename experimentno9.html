<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>
</head>

<body>
<h3>Name: Madhuri Farakate</h3>
<h3>Roll Number: 46</h3>

<h2>🎓 Student Registration Form</h2>

<div id="formBox">
<form onsubmit="showSuccess(); return false;">

    <p>
        <label>Full Name:</label><br>
        <input type="text" name="name" required>
    </p>

    <p>
        <label>Email:</label><br>
        <input type="email" name="email" required>
    </p>

    <p>
        <label>Password:</label><br>
        <input type="password" name="password" required>
    </p>

    <p>
        <label>Phone Number:</label><br>
        <input type="tel" name="phone" pattern="[0-9]{10}" required>
    </p>

    <p>
        <label>Date of Birth:</label><br>
        <input type="date" name="dob" required>
    </p>

    <p>
        <label>Gender:</label><br>
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
        <input type="radio" name="gender" value="Other"> Other
    </p>

    <p>
        <label>Course:</label><br>
        <select name="course" required>
            <option value="">Select Course</option>
            <option>B.Tech</option>
            <option>BCA</option>
            <option>BBA</option>
            <option>BSc</option>
            <option>MCA</option>
        </select>
    </p>

    <p>
        <label>Department:</label><br>
        <input list="dept" name="department">
        <datalist id="dept">
            <option value="Computer Science">
            <option value="Information Technology">
            <option value="Electronics">
            <option value="Mechanical">
            <option value="Civil">
            <option value="AIML">
            <option value="Data Science">
        </datalist>
    </p>

    <p>
        <label>Skills:</label><br>
        <input type="checkbox" name="skills" value="Java"> Java<br>
        <input type="checkbox" name="skills" value="Python"> Python<br>
        <input type="checkbox" name="skills" value="Web Development"> Web Development<br>
        <input type="checkbox" name="skills" value="Machine Learning"> Machine Learning<br>
        <input type="checkbox" name="skills" value="Data Analysis"> Data Analysis
    </p>

    <p>
        <label>Upload Photo:</label><br>
        <input type="file" name="photo">
    </p>

    <p>
        <label>Address:</label><br>
        <textarea name="address" rows="3"></textarea>
    </p>

    <button type="submit">Register</button>

</form>
</div>


<div id="successBox" style="display:none;">
    <h2>✅ Registration Successful!</h2>
    <p>Your form has been submitted successfully.</p>
</div>

<script>
function showSuccess() {
    document.getElementById("formBox").style.display = "none";
    document.getElementById("successBox").style.display = "block";
}
</script>

</body>
</html>
