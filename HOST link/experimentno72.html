<!DOCTYPE html>
<html>
<head>
<title>Links Demonstration</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(to right, #89f7fe, #66a6ff);
        margin: 0;
        padding: 20px;
        text-align: center;
    }

    .container {
        max-width: 700px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
        color: #0d47a1;
    }

    h3 {
        color: #444;
    }

    
    .link-btn {
        display: inline-block;
        margin: 10px;
        padding: 10px 20px;
        background: #1976d2;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        transition: 0.3s;
    }

    .link-btn:hover {
        background: #0d47a1;
        transform: scale(1.05);
    }

   
    .email {
        background: #d32f2f;
    }

    .email:hover {
        background: #b71c1c;
    }

    .img-link img {
        width: 200px;
        border-radius: 10px;
        transition: 0.3s;
    }

    .img-link img:hover {
        transform: scale(1.08);
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
</style>

</head>

<body>

<div class="container">

<h3>Madhuri Shankar Farakate</h3>
<h3>Roll No: 46</h3>

<h1>🔗 HTML Links Demonstration</h1>

<a href="https://www.google.com" class="link-btn">Google</a>

<a href="https://www.wikipedia.org" target="_blank" class="link-btn">
Open Wikipedia
</a>

<a href="practical3.html" class="link-btn">
About Page
</a>

<a href="mailto:madhurifarakate63@gmail.com" class="link-btn email">
Send Email
</a>

<br><br>

<a href="https://www.youtube.com" target="_blank" class="img-link">
<img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" 
     alt="YouTube Image">
</a>

</div>

</body>
</html>
