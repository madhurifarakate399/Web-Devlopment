<!DOCTYPE html>
<html>
<head>
  <title>Multiple Google Map Iframes</title>
</head>
<body>
<h1>Madhuri Shankar Farakate</h1>
<h1>Roll No: 46</h1>
<h1 align="center">Multiple Google Maps Iframe Example</h1>


<h2>Pune Map</h2>
<iframe 
  src="https://www.google.com/maps?q=Pune,India&output=embed"
  width="800"
  height="400"
  style="border:2px solid black;">
</iframe>

<br><br>


<h2>Kolhapur and Mumbai Maps</h2>

<div style="display:flex; gap:10px;">


  <iframe 
    src="https://www.google.com/maps?q=Kolhapur,India&output=embed"
    width="50%"
    height="300"
    style="border:2px solid blue;">
  </iframe>


  <iframe 
    src="https://www.google.com/maps?q=Mumbai,India&output=embed"
    width="50%"
    height="300"
    style="border:2px solid green;">
  </iframe>

</div>

</body>
</html>
