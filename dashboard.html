<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Category Dashboard</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #0b1120;
      --surface: rgba(15, 23, 42, 0.95);
      --surface-strong: rgba(17, 24, 39, 0.98);
      --text: #eef2ff;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-strong: #7c3aed;
      --shadow: 0 30px 80px rgba(15, 23, 42, 0.35);
    }
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, #3b82f6 0%, transparent 40%),
                  radial-gradient(circle at bottom right, #8b5cf6 0%, transparent 35%),
                  linear-gradient(180deg, #0f172a 0%, #020617 100%);
      color: var(--text);
    }
    .page {
      width: min(100%, 1250px);
      margin: 0 auto;
      padding: 42px 36px 72px;
    }
    h1 {
      margin: 0;
      font-size: clamp(3rem, 5vw, 4.4rem);
      letter-spacing: -0.04em;
      line-height: 1.02;
    }
    .subtitle {
      margin: 18px 0 40px;
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 760px;
      line-height: 1.8;
    }
    .categories {
      display: grid;
      gap: 28px;
      grid-template-columns: repeat(3, minmax(240px, 1fr));
      margin-bottom: 32px;
    }
    .card {
      position: relative;
      display: block;
      overflow: hidden;
      min-height: 190px;
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(15, 23, 42, 0.95);
      padding: 32px 28px;
      cursor: pointer;
      transition: transform 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease, background 0.35s ease;
      box-shadow: 0 36px 90px rgba(15, 23, 42, 0.28);
      text-decoration: none;
      color: inherit;
    }
    .card h2 {
      margin: 0;
      font-size: 1.6rem;
      letter-spacing: -0.04em;
      line-height: 1.18;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), transparent 48%);
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    .card:hover {
      transform: translateY(-8px) scale(1.01);
      border-color: rgba(59, 130, 246, 0.55);
      background: rgba(15, 23, 42, 0.95);
      box-shadow: 0 42px 100px rgba(15, 23, 42, 0.32);
    }
    .card:hover::before {
      opacity: 1;
    }
    .card::after {
      content: '';
      position: absolute;
      width: 120%;
      height: 120%;
      top: -10%;
      left: -10%;
      background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.22), transparent 30%),
                  radial-gradient(circle at bottom left, rgba(147, 51, 234, 0.18), transparent 25%);
      pointer-events: none;
    }
    .card[data-category='htmlOnly'] {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(15, 23, 42, 0.95));
    }
    .card[data-category='htmlCss'] {
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.14), rgba(15, 23, 42, 0.95));
    }
    .card[data-category='xmlXsl'] {
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.16), rgba(15, 23, 42, 0.95));
    }
    .list-panel {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 30px;
      padding: 30px;
      backdrop-filter: blur(14px);
      min-height: 220px;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .list-panel.active {
      transform: translateY(0);
      opacity: 1;
    }
    .list-panel h2 {
      margin: 0 0 18px;
      font-size: 1.9rem;
      letter-spacing: -0.03em;
    }
    .files {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 12px;
    }
    .files li {
      font-size: 1rem;
      color: #e2e8f0;
    }
    .files a {
      color: #bae6fd;
      text-decoration: none;
      padding: 14px 18px;
      display: inline-flex;
      width: fit-content;
      border-radius: 14px;
      transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
      background: rgba(15, 23, 42, 0.36);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .files a:hover {
      transform: translateY(-2px);
      background: rgba(56, 189, 248, 0.18);
      color: #eff6ff;
    }
    .empty {
      color: #94a3b8;
      padding: 16px 0;
    }
    .hint-panel {
      margin-top: 14px;
      padding: 22px 26px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(148, 163, 184, 0.12);
      color: #cbd5e1;
      font-size: 1rem;
      max-width: 780px;
    }
    .hint-panel p {
      margin: 0;
      line-height: 1.8;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      color: #cbd5e1;
      font-size: 0.95rem;
    }
    .tag span {
      display: inline-flex;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.45);
    }
    @media (max-width: 900px) {
      .categories {
        grid-template-columns: repeat(2, minmax(220px, 1fr));
      }
    }
    @media (max-width: 620px) {
      .categories {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Category Dashboard</h1>
    <p class="subtitle">Click one of the categories below to reveal the matching workspace files. Only the category names are visible initially for a cleaner experience.</p>
    <div class="categories">
      <a class="card" href="html-only.html">
        <h2>Only HTML</h2>
      </a>
      <a class="card" href="html-css.html">
        <h2>HTML with CSS</h2>
      </a>
      <a class="card" href="xml-xsl.html">
        <h2>XML and XSL</h2>
      </a>
    </div>

    <div class="hint-panel">
      <p>Click a category to open a dedicated page with the matching files.</p>
    </div>
  </div>
</body>
</html>
