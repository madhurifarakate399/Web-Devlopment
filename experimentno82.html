<!DOCTYPE html>
<html>
<head>
    <title>HTML Table Example</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(to right, #74ebd5, #9face6);
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            color: #0d47a1;
        }

        h3 {
            color: #444;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #1976d2;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        tr:hover {
            background: #e3f2fd;
            transform: scale(1.01);
        }

        hr {
            margin: 25px 0;
        }

        .footer {
            font-weight: bold;
            color: #555;
        }
    </style>

</head>

<body>

<div class="container">

<h2>📊 Student Details</h2>
<h3>Name: Madhuri Farakate</h3>
<h3>Roll Number: 46</h3>

<table>
    <tr>
        <th>Name</th>
        <th>Roll No</th>
        <th>Course</th>
    </tr>
    <tr>
        <td>Madhuri Farakate</td>
        <td>46</td>
        <td>Computer Science</td>
    </tr>
    <tr>
        <td>Rahul</td>
        <td>102</td>
        <td>Data Science</td>
    </tr>
    <tr>
        <td>Rohit</td>
        <td>23</td>
        <td>Data Science</td>
    </tr>
    <tr>
        <td>Rutik</td>
        <td>38</td>
        <td>Mechanical Engineering</td>
    </tr>
</table>

<hr>

<p class="footer">Submitted by: Madhuri Farakate</p>

</div>

</body>
</html>
