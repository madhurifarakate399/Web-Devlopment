<!DOCTYPE html>
<html>
<head>
    <title>Food Menu</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #f857a6, #ff5858);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .menu {
            background: white;
            width: 400px;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #d32f2f;
        }

        .item {
            display: flex;
            align-items: center;
            margin: 15px 0;
            padding: 10px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .item:hover {
            background: #fff3f3;
            transform: scale(1.03);
        }

        .item img {
            width: 70px;
            height: 70px;
            border-radius: 10px;
            margin-right: 15px;
            object-fit: cover;
        }

        .details {
            flex: 1;
        }

        .details h3 {
            margin: 0;
            color: #333;
        }

        .details p {
            margin: 5px 0;
            font-size: 14px;
            color: #777;
        }

        .price {
            color: #d32f2f;
            font-weight: bold;
        }
    </style>

</head>

<body>

<div class="menu">

    <h1>🍽️ Food Menu</h1>

   
    <div class="item">
        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=200&auto=format&fit=crop" alt="Burger">
        <div class="details">
            <h3>Burger</h3>
            <p>Cheesy and delicious</p>
        </div>
        <div class="price">₹120</div>
    </div>

   
    <div class="item">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Supreme_pizza.jpg" alt="Pizza">
        <div class="details">
            <h3>Pizza</h3>
            <p>Loaded with toppings</p>
        </div>
        <div class="price">₹250</div>
    </div>

  
    <div class="item">
        <img src="https://www.chewoutloud.com/wp-content/uploads/2025/09/Chicken-Fajita-Pasta-in-Pan-Square.jpg" alt="Pasta">
        <div class="details">
            <h3>Pasta</h3>
            <p>Creamy Italian pasta</p>
        </div>
        <div class="price">₹180</div>
    </div>

    <div class="item">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/45/A_small_cup_of_coffee.JPG" alt="Coffee">
        <div class="details">
            <h3>Coffee</h3>
            <p>Hot and refreshing</p>
        </div>
        <div class="price">₹80</div>
    </div>

</div>

</body>
</html>
