<!DOCTYPE html>
<html>
<head>
    <title>Web Viewer Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .header {
            background: #1976d2;
            color: white;
            text-align: center;
            padding: 10px;
        }

        .main {
            display: flex;
            height: 90vh;
        }

        .sidebar {
            width: 220px;
            background: #0d47a1;
            padding: 20px;
            color: white;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #1565c0;
        }

        .content {
            flex: 1;
            padding: 10px;
            background: #f4f6f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: auto;
        }

        img {
            max-width: 500px;
            max-height: 400px;
            width: auto;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        iframe {
            max-width: 500px;
            max-height: 400px;
            width: 90%;
            height: 90%;
            border: none;
            border-radius: 10px;
        }
    </style>

</head>

<body>

<div class="header">
    <h2>🌐 Web Viewer Dashboard</h2>
    <p>Name: Madhuri Shankar Farakate | Roll No: 46</p>
</div>

<div class="main">

    <div class="sidebar">
        <h3>Menu</h3>

       
        <a href="javascript:loadContent('https://www.wikipedia.org', 'url')">📘 Wikipedia</a>
        <a href="javascript:loadContent('https://d2dkqamqz2k831.cloudfront.net/uploads/2025-01-14T08%3A01%3A56.372Z_is%20html%20hard%20to%20learn%20%281%29.png', 'image')">💻 Learn HTML</a>
        <a href="javascript:loadContent('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSXM-vF6_BqjidS5HZR48tZISiMeGzmMSx3WQ&s', 'image')">🌐 Example Site</a>
        <a href="javascript:loadContent('https://www.google.com/maps?q=Pune,India', 'url')">🗺️ Maps</a>
    </div>

    <div class="content">
        <img id="viewer" src="https://d2dkqamqz2k831.cloudfront.net/uploads/2025-01-14T08%3A01%3A56.372Z_is%20html%20hard%20to%20learn%20%281%29.png" alt="Content Viewer">
    </div>

    <script>
        function loadContent(url, type) {
            const viewer = document.getElementById('viewer');
            if (type === 'image') {
                viewer.src = url;
                viewer.style.display = 'block';
            } else if (type === 'url') {
                window.open(url);
            }
        }
    </script>

</div>

</body>
</html>
